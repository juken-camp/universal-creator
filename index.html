<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<meta name="theme-color" content="#04050a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UNIVERSAL CREATOR — 宇宙を、その手で。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Shippori+Mincho+B1:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04050a;
    --ink:#eef1f8;
    --dim:rgba(238,241,248,.55);
    --faint:rgba(238,241,248,.32);
    --hair:rgba(238,241,248,.10);
    --hair-strong:rgba(238,241,248,.18);
    --gold:#e9cda0;
    --blue:#9db9ff;
    --panel:rgba(8,10,18,.42);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);}
  body{
    font-family:"Cormorant Garamond",serif;
    position:fixed;inset:0;
    touch-action:none;
    overscroll-behavior:none;
  }
  #scene{position:fixed;inset:0;display:block;width:100%;height:100%;}

  /* subtle film: vignette + grain to give the void depth */
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:5;
    background:radial-gradient(circle at 50% 46%, transparent 38%, rgba(0,0,0,.30) 78%, rgba(0,0,0,.66) 100%);
    mix-blend-mode:multiply;}
  #grain{position:fixed;inset:-50%;pointer-events:none;z-index:6;opacity:.045;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    animation:grain 7s steps(6) infinite;}
  @keyframes grain{0%{transform:translate(0,0)}20%{transform:translate(-4%,3%)}40%{transform:translate(3%,-2%)}60%{transform:translate(-2%,-3%)}80%{transform:translate(4%,2%)}100%{transform:translate(0,0)}}

  /* charge ring that follows the touch while pressing to forge mass */
  #charge{position:fixed;z-index:8;pointer-events:none;left:0;top:0;width:0;height:0;
    border-radius:50%;border:1px solid rgba(233,205,160,.0);transform:translate(-50%,-50%);
    box-shadow:0 0 0 0 rgba(233,205,160,0);transition:none;opacity:0;}

  /* top title plate */
  .topbar{position:fixed;z-index:10;top:0;left:0;right:0;display:flex;justify-content:center;
    padding:max(14px,env(safe-area-inset-top)) 14px 0;pointer-events:none;}
  .title{pointer-events:auto;cursor:pointer;text-align:center;line-height:1;}
  .title .en{font-size:clamp(13px,3.4vw,17px);letter-spacing:.42em;font-weight:400;
    color:var(--ink);opacity:.82;text-indent:.42em;}
  .title .jp{font-family:"Shippori Mincho B1",serif;font-size:11px;letter-spacing:.32em;
    color:var(--faint);margin-top:6px;text-indent:.32em;}

  /* discovery toast */
  #toast{position:fixed;z-index:12;top:84px;left:50%;transform:translateX(-50%) translateY(-8px);
    text-align:center;opacity:0;transition:opacity .9s ease,transform .9s ease;pointer-events:none;width:90%;}
  #toast .k{font-size:10px;letter-spacing:.5em;color:var(--gold);opacity:.85;text-indent:.5em;}
  #toast .n{font-family:"Shippori Mincho B1",serif;font-size:clamp(20px,5.5vw,30px);
    color:var(--ink);margin-top:8px;letter-spacing:.14em;text-shadow:0 0 24px rgba(157,185,255,.45);}
  #toast .d{font-family:"Shippori Mincho B1",serif;font-size:12px;color:var(--dim);margin-top:8px;letter-spacing:.08em;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* readout — observatory plate, bottom-left */
  .readout{position:fixed;z-index:10;left:max(16px,env(safe-area-inset-left));
    bottom:calc(70px + env(safe-area-inset-bottom));
    font-size:12px;letter-spacing:.06em;color:var(--dim);line-height:1.85;
    text-transform:uppercase;}
  .readout .row{display:flex;gap:10px;align-items:baseline;}
  .readout .lab{font-size:9.5px;letter-spacing:.34em;color:var(--faint);min-width:74px;}
  .readout .val{font-size:16px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
  .readout .val small{font-size:10px;color:var(--faint);letter-spacing:.18em;margin-left:3px;}
  .harm-bar{position:relative;width:108px;height:1px;background:var(--hair);margin-top:5px;overflow:visible;}
  .harm-bar i{position:absolute;left:0;top:-1px;height:3px;width:0;
    background:linear-gradient(90deg,var(--gold),var(--blue));box-shadow:0 0 8px rgba(157,185,255,.6);
    transition:width .5s ease;}

  /* bottom control rail */
  .rail{position:fixed;z-index:11;left:50%;transform:translateX(-50%);
    bottom:calc(16px + env(safe-area-inset-bottom));
    display:flex;align-items:stretch;gap:0;
    background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--hair);border-radius:2px;overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,.45);}
  .rail button{appearance:none;background:transparent;border:0;border-left:1px solid var(--hair);
    color:var(--dim);font-family:"Cormorant Garamond",serif;cursor:pointer;
    padding:11px 15px;display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:color .25s ease,background .25s ease;min-width:62px;}
  .rail button:first-child{border-left:0;}
  .rail button .ic{font-size:15px;line-height:1;opacity:.92;}
  .rail button .tx{font-family:"Shippori Mincho B1",serif;font-size:9.5px;letter-spacing:.18em;
    color:var(--faint);text-indent:.18em;}
  .rail button:hover,.rail button:active{color:var(--ink);background:rgba(255,255,255,.05);}
  .rail button:hover .tx{color:var(--dim);}
  .rail button.on{color:var(--gold);}
  .rail button.on .tx{color:rgba(233,205,160,.7);}

  /* onboarding veil */
  #veil{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    background:radial-gradient(circle at 50% 50%, rgba(4,5,10,.35), rgba(4,5,10,.78));
    transition:opacity 1.4s ease;padding:24px;}
  #veil h1{font-family:"Shippori Mincho B1",serif;font-weight:500;
    font-size:clamp(30px,8.5vw,58px);letter-spacing:.16em;line-height:1.4;
    text-indent:.16em;text-shadow:0 0 40px rgba(157,185,255,.4);
    animation:rise 2.2s cubic-bezier(.2,.7,.2,1) both;}
  #veil p{font-family:"Shippori Mincho B1",serif;font-size:clamp(13px,3.6vw,16px);
    color:var(--dim);margin-top:26px;letter-spacing:.16em;line-height:2.1;
    animation:rise 2.2s .35s cubic-bezier(.2,.7,.2,1) both;}
  #veil .cue{margin-top:40px;font-size:11px;letter-spacing:.46em;color:var(--gold);
    text-indent:.46em;opacity:0;animation:pulse 3.4s 1.4s ease-in-out infinite;}
  @keyframes rise{from{opacity:0;transform:translateY(16px);filter:blur(6px)}to{opacity:1;transform:none;filter:none}}
  @keyframes pulse{0%,100%{opacity:.25}50%{opacity:.85}}
  #veil.gone{opacity:0;pointer-events:none;}

  /* discoveries sheet */
  #sheet{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
    background:rgba(4,5,10,.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:24px;}
  #sheet.show{display:flex;animation:fade .5s ease both;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet-card{width:min(440px,92vw);max-height:80vh;overflow:auto;
    background:linear-gradient(180deg,rgba(12,15,24,.92),rgba(6,8,14,.94));
    border:1px solid var(--hair-strong);border-radius:3px;padding:26px 24px;}
  .sheet-card h2{font-family:"Shippori Mincho B1",serif;font-weight:500;font-size:18px;
    letter-spacing:.2em;text-indent:.2em;color:var(--ink);}
  .sheet-card .sub{font-size:11px;letter-spacing:.32em;color:var(--faint);margin-top:6px;text-transform:uppercase;}
  .disc{display:flex;gap:14px;padding:15px 0;border-top:1px solid var(--hair);align-items:flex-start;}
  .disc:first-of-type{margin-top:18px;}
  .disc .mark{font-size:18px;line-height:1.3;width:24px;text-align:center;flex:0 0 auto;}
  .disc.found .mark{color:var(--gold);text-shadow:0 0 14px rgba(233,205,160,.6);}
  .disc.locked{opacity:.4;}
  .disc .body .t{font-family:"Shippori Mincho B1",serif;font-size:15px;letter-spacing:.12em;color:var(--ink);}
  .disc .body .c{font-size:13px;color:var(--dim);margin-top:4px;letter-spacing:.04em;line-height:1.55;}
  .disc.locked .body .c{font-family:"Shippori Mincho B1",serif;}
  .sheet-close{margin-top:22px;width:100%;text-align:center;padding:12px;cursor:pointer;
    border:1px solid var(--hair-strong);border-radius:2px;color:var(--dim);
    font-family:"Shippori Mincho B1",serif;letter-spacing:.3em;text-indent:.3em;font-size:12px;
    transition:color .2s,border-color .2s;}
  .sheet-close:hover{color:var(--ink);border-color:var(--hair);}

  #fps{position:fixed;z-index:9;right:8px;top:max(8px,env(safe-area-inset-top));
    font-size:9px;letter-spacing:.1em;color:var(--faint);opacity:0;font-variant-numeric:tabular-nums;}
  @media (max-width:480px){
    .rail button{min-width:54px;padding:10px 11px;}
    .readout{font-size:11px;}
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="vignette"></div>
  <div id="grain"></div>
  <div id="charge"></div>

  <div class="topbar">
    <div class="title" id="title" title="視点を戻す">
      <div class="en">UNIVERSAL&nbsp;CREATOR</div>
      <div class="jp">宇宙を、その手で</div>
    </div>
  </div>

  <div id="toast"><div class="k">DISCOVERY</div><div class="n"></div><div class="d"></div></div>

  <div class="readout">
    <div class="row"><span class="lab">STARS</span><span class="val" id="r-stars">0</span></div>
    <div class="row"><span class="lab">GRAVITY</span><span class="val" id="r-wells">0</span></div>
    <div class="row"><span class="lab">HARMONY</span><span class="val" id="r-harm">0<small>%</small></span></div>
    <div class="harm-bar"><i id="r-harm-bar"></i></div>
  </div>

  <div class="rail">
    <button id="btn-pause"><span class="ic">❚❚</span><span class="tx">静止</span></button>
    <button id="btn-speed"><span class="ic">▸</span><span class="tx">1.0×</span></button>
    <button id="btn-seed"><span class="ic">✸</span><span class="tx">銀河</span></button>
    <button id="btn-clear"><span class="ic">○</span><span class="tx">無</span></button>
    <button id="btn-sound"><span class="ic">♪</span><span class="tx">音</span></button>
    <button id="btn-disc"><span class="ic">✧</span><span class="tx">発見</span></button>
  </div>

  <div id="sheet">
    <div class="sheet-card">
      <h2>発見した宇宙の現象</h2>
      <div class="sub" id="disc-count">0 / 8 DISCOVERED</div>
      <div id="disc-list"></div>
      <div class="sheet-close" id="sheet-close">閉じる</div>
    </div>
  </div>

  <div id="veil">
    <h1>宇宙を、その手で。</h1>
    <p>触れて、見えない重力を置く。<br>やがて、光が集まりはじめる。</p>
    <div class="cue">画面に触れて はじめる</div>
  </div>

  <div id="fps">— fps</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  /* ============================================================
     UNIVERSAL CREATOR  ·  reimagined
     A GPU starfield where invisible gravity is revealed only by
     the light it gathers.  Show, don't tell.
     ============================================================ */
  "use strict";

  /* ============================================================
     UNIVERSAL CREATOR — engine
     ============================================================ */

  const THREE = window.THREE;

  /* ---------- device / quality ---------- */
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const COARSE = window.matchMedia && window.matchMedia('(pointer:coarse)').matches;
  const SMALL = Math.min(innerWidth, innerHeight) < 760;
  const N_MAX = (COARSE || SMALL) ? 22000 : 42000;
  let activeCount = (COARSE || SMALL) ? 12000 : 30000;   // adaptively tuned at runtime
  const FIELD = 620;          // simulation half-extent
  const BOUND = 1500;         // recycle boundary
  const MAX_WELLS = 14;

  /* ---------- renderer / scene / camera ---------- */
  const canvas = document.getElementById('scene');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false, powerPreference:'high-performance' });
  renderer.setPixelRatio(DPR);
  renderer.setSize(innerWidth, innerHeight, true);
  renderer.setClearColor(0x04050a, 1);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x04050a, 0.00035);

  const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 1, 8000);

  /* spherical orbit camera (custom, damped) */
  const cam = {
    theta: 0.6, phi: 1.18, radius: 1180,
    tTheta: 0.6, tPhi: 1.18, tRadius: 1180,
    target: new THREE.Vector3(0,0,0)
  };
  const RAD_MIN = 280, RAD_MAX = 3200, PHI_MIN = 0.18, PHI_MAX = Math.PI - 0.18;
  function applyCamera(){
    cam.theta  += (cam.tTheta  - cam.theta ) * 0.10;
    cam.phi    += (cam.tPhi    - cam.phi   ) * 0.10;
    cam.radius += (cam.tRadius - cam.radius) * 0.08;
    const sp = Math.sin(cam.phi), cp = Math.cos(cam.phi);
    camera.position.set(
      cam.target.x + cam.radius * sp * Math.sin(cam.theta),
      cam.target.y + cam.radius * cp,
      cam.target.z + cam.radius * sp * Math.cos(cam.theta)
    );
    camera.lookAt(cam.target);
  }

  /* ---------- textures (canvas-generated) ---------- */
  function radialTexture(stops){
    const s = 128, c = document.createElement('canvas'); c.width = c.height = s;
    const g = c.getContext('2d');
    const grd = g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
    stops.forEach(st => grd.addColorStop(st[0], st[1]));
    g.fillStyle = grd; g.fillRect(0,0,s,s);
    const t = new THREE.Texture(c); t.needsUpdate = true; return t;
  }
  function ringTexture(){
    const s = 256, c = document.createElement('canvas'); c.width = c.height = s;
    const g = c.getContext('2d');
    g.translate(s/2,s/2);
    for (let i=0;i<46;i++){
      const r = s*0.46 * (i/46);
      const a = Math.pow(1-Math.abs(i/46-0.78)/0.78, 3);
      g.beginPath(); g.arc(0,0,r,0,Math.PI*2);
      g.strokeStyle = 'rgba(220,232,255,'+(a*0.5).toFixed(3)+')';
      g.lineWidth = 1.4; g.stroke();
    }
    const t = new THREE.Texture(c); t.needsUpdate = true; return t;
  }
  const TEX_GLOW = radialTexture([[0,'rgba(255,255,255,1)'],[0.18,'rgba(255,246,224,0.95)'],[0.45,'rgba(173,198,255,0.35)'],[1,'rgba(120,150,255,0)']]);
  const TEX_SOFT = radialTexture([[0,'rgba(255,255,255,1)'],[0.4,'rgba(220,230,255,0.5)'],[1,'rgba(180,200,255,0)']]);
  const TEX_RING = ringTexture();

  /* ---------- starfield (distant, static depth) ---------- */
  (function buildStars(){
    const N = 2600, pos = new Float32Array(N*3), col = new Float32Array(N*3);
    for (let i=0;i<N;i++){
      const r = 2600 + Math.random()*2600;
      const u = Math.random()*2-1, t = Math.random()*Math.PI*2, s = Math.sqrt(1-u*u);
      pos[i*3]=r*s*Math.cos(t); pos[i*3+1]=r*u; pos[i*3+2]=r*s*Math.sin(t);
      const w = 0.55 + Math.random()*0.45, tint = Math.random();
      col[i*3]=w*(0.9+tint*0.1); col[i*3+1]=w*(0.92+0.06*Math.random()); col[i*3+2]=w*(0.95+0.05*(1-tint));
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos,3));
    g.setAttribute('color', new THREE.BufferAttribute(col,3));
    const m = new THREE.PointsMaterial({ size:2.2, sizeAttenuation:false, vertexColors:true,
      transparent:true, opacity:0.85, blending:THREE.AdditiveBlending, depthWrite:false, map:TEX_SOFT });
    scene.add(new THREE.Points(g,m));
  })();

  /* ---------- the particle cosmos (custom shader points) ---------- */
  const pos   = new Float32Array(N_MAX*3);
  const vel   = new Float32Array(N_MAX*3);
  const aTemp = new Float32Array(N_MAX);
  const aSize = new Float32Array(N_MAX);
  const stab  = new Float32Array(N_MAX);   // per-particle orbital stability proxy
  const rPrev = new Float32Array(N_MAX);   // previous radius from nearest mass (for stability)

  function spawnShell(i, fromEdge){
    const r = fromEdge ? (FIELD*0.92 + Math.random()*FIELD*0.5) : (FIELD*0.28 + Math.random()*FIELD*0.8);
    const u = Math.random()*2-1, t = Math.random()*Math.PI*2, s = Math.sqrt(1-u*u);
    const x = r*s*Math.cos(t), y = r*u*0.55, z = r*s*Math.sin(t);
    pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=z;
    // gentle tangential drift so matter tends to swirl, not just fall in
    const sp = 0.35 + Math.random()*0.5;
    vel[i*3]   = -z/r*sp + (Math.random()-0.5)*0.18;
    vel[i*3+1] = (Math.random()-0.5)*0.12;
    vel[i*3+2] =  x/r*sp + (Math.random()-0.5)*0.18;
    aSize[i] = 0.85 + Math.random()*1.5;
    aTemp[i] = 0.12; stab[i]=0; rPrev[i]=r;
  }
  for (let i=0;i<N_MAX;i++) spawnShell(i, true);

  const geo = new THREE.BufferGeometry();
  const posAttr  = new THREE.BufferAttribute(pos,3);   posAttr.setUsage(THREE.DynamicDrawUsage);
  const tempAttr = new THREE.BufferAttribute(aTemp,1); tempAttr.setUsage(THREE.DynamicDrawUsage);
  geo.setAttribute('position', posAttr);
  geo.setAttribute('aTemp', tempAttr);
  geo.setAttribute('aSize', new THREE.BufferAttribute(aSize,1));
  geo.setDrawRange(0, activeCount);

  const pMat = new THREE.ShaderMaterial({
    uniforms:{ uScale:{value: innerHeight*4.5}, uDpr:{value:DPR}, uMood:{value:0} },
    vertexShader:`
      attribute float aTemp; attribute float aSize;
      uniform float uScale; uniform float uDpr;
      varying float vTemp;
      void main(){
        vTemp = aTemp;
        vec4 mv = modelViewMatrix * vec4(position,1.0);
        gl_PointSize = clamp(aSize * uScale / max(40.0,-mv.z), 1.0, 64.0) * uDpr;
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader:`
      varying float vTemp;
      uniform float uMood;
      void main(){
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if (d > 0.5) discard;
        float core = smoothstep(0.5, 0.0, d);
        float glow = pow(core, 2.3);
        vec3 cold = vec3(0.98,0.36,0.16);
        vec3 mid  = vec3(0.99,0.84,0.55);
        vec3 hot  = vec3(0.55,0.78,1.0);
        vec3 col = mix(cold, mid, smoothstep(0.0,0.5,vTemp));
        col = mix(col, hot, smoothstep(0.5,1.0,vTemp));
        col = mix(col, vec3(1.0), pow(core,7.0)*0.85);
        vec3 warm = vec3(1.08,0.97,0.86);
        vec3 cool = vec3(0.88,0.96,1.10);
        col *= mix(warm, cool, uMood*0.5+0.5);
        gl_FragColor = vec4(col, glow);
      }`,
    transparent:true, blending:THREE.AdditiveBlending, depthTest:true, depthWrite:false
  });
  scene.add(new THREE.Points(geo, pMat));

  /* ---------- gravity wells ---------- */
  let wells = [];
  let wellSeq = 0;
  function makeWell(x,y,z,mass){
    const grp = new THREE.Group();
    const core = new THREE.Sprite(new THREE.SpriteMaterial({ map:TEX_GLOW, color:0xfff0d8,
      transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false }));
    const ring = new THREE.Sprite(new THREE.SpriteMaterial({ map:TEX_RING, color:0xbcd0ff,
      transparent:true, opacity:0.5, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false }));
    grp.add(ring); grp.add(core);
    grp.position.set(x,y,z);
    scene.add(grp);
    return { id:++wellSeq, x,y,z, vx:0,vy:0,vz:0, mass, accreted:0, born:performance.now(),
             grp, core, ring, pulse:Math.random()*6.28 };
  }
  function addWell(x,y,z,mass){
    if (wells.length >= MAX_WELLS){ const old = wells.shift(); stopVoice(old); scene.remove(old.grp); }
    const w = makeWell(x,y,z,mass);
    wells.push(w);
    ping(mass);
    startVoice(w);
    return w;
  }
  function clearWells(){ wells.forEach(w=>{ stopVoice(w); scene.remove(w.grp); }); wells = []; }

  /* ---------- transient effects (flashes + ripples) ---------- */
  const flashPool = [], FLASH_N = 80;
  for (let i=0;i<FLASH_N;i++){
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:TEX_GLOW, color:0xffffff,
      transparent:true, opacity:0, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false }));
    sp.visible=false; scene.add(sp); flashPool.push({ sp, life:0, max:0, size:0 });
  }
  let flashIdx = 0;
  function flash(x,y,z,size,col){
    const f = flashPool[flashIdx]; flashIdx=(flashIdx+1)%FLASH_N;
    f.sp.position.set(x,y,z); f.sp.material.color.setHex(col||0xfff2dc);
    f.size=size; f.life=1; f.max=0.45; f.sp.visible=true;
  }
  const ripplePool = [], RIPPLE_N = 14;
  for (let i=0;i<RIPPLE_N;i++){
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:TEX_RING, color:0xbcd0ff,
      transparent:true, opacity:0, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false }));
    sp.visible=false; scene.add(sp); ripplePool.push({ sp, life:0, from:0, to:0 });
  }
  let rippleIdx = 0;
  function ripple(x,y,z,to){
    const r = ripplePool[rippleIdx]; rippleIdx=(rippleIdx+1)%RIPPLE_N;
    r.sp.position.set(x,y,z); r.from=40; r.to=to; r.life=1; r.sp.visible=true;
  }

  /* ---------- simulation state ---------- */
  let running = true;
  let timeFlow = 1.0;
  const SPEEDS = [0.5,1.0,2.0,4.0];
  let speedIdx = 1;
  let harmony = 0, harmonyShown = 0;
  let lastInteract = performance.now();

  /* ---------- physics step ---------- */
  const G = 70.0, SOFT = 220.0; // capture handled via well radius
  function radiusOf(w){ return 9 + Math.sqrt(w.mass)*5 + Math.min(40, w.accreted*0.05); }

  function step(dt){
    const f = dt * timeFlow;
    // well-well n-body + merge
    for (let a=0;a<wells.length;a++){
      const wa = wells[a];
      for (let b=a+1;b<wells.length;b++){
        const wb = wells[b];
        let dx=wb.x-wa.x, dy=wb.y-wa.y, dz=wb.z-wa.z;
        let d2=dx*dx+dy*dy+dz*dz;
        const ra=radiusOf(wa), rb=radiusOf(wb);
        if (d2 < (ra+rb)*(ra+rb)*1.1){
          // merge — conserve momentum, conserve "mass"
          const m=wa.mass+wb.mass;
          wa.x=(wa.x*wa.mass+wb.x*wb.mass)/m; wa.y=(wa.y*wa.mass+wb.y*wb.mass)/m; wa.z=(wa.z*wa.mass+wb.z*wb.mass)/m;
          wa.vx=(wa.vx*wa.mass+wb.vx*wb.mass)/m; wa.vy=(wa.vy*wa.mass+wb.vy*wb.mass)/m; wa.vz=(wa.vz*wa.mass+wb.vz*wb.mass)/m;
          wa.mass=m; wa.accreted+=wb.accreted;
          stopVoice(wb);
          scene.remove(wb.grp); wells.splice(b,1); b--;
          ripple(wa.x,wa.y,wa.z, radiusOf(wa)*9);
          flash(wa.x,wa.y,wa.z, radiusOf(wa)*2.4, 0xdfeaff);
          stopVoice(wa); startVoice(wa);
          swell();
          unlock('merger');
          continue;
        }
        const inv = 1/Math.sqrt(d2+SOFT);
        const inv3 = inv*inv*inv;
        const fa = G*wb.mass*inv3*f, fb = G*wa.mass*inv3*f;
        wa.vx += dx*fa; wa.vy += dy*fa; wa.vz += dz*fa;
        wb.vx -= dx*fb; wb.vy -= dy*fb; wb.vz -= dz*fb;
      }
    }
    for (const w of wells){
      w.x+=w.vx*f; w.y+=w.vy*f; w.z+=w.vz*f;
      w.vx*=0.9995; w.vy*=0.9995; w.vz*=0.9995;
    }

    // particles vs wells
    const nW = wells.length;
    if (nW === 0) {
      // free drift, slow damp
      for (let i=0;i<activeCount;i++){
        const ix=i*3;
        pos[ix]+=vel[ix]*f; pos[ix+1]+=vel[ix+1]*f; pos[ix+2]+=vel[ix+2]*f;
        aTemp[i] += (0.1 - aTemp[i])*0.05;
      }
    } else {
      // flatten well data for the hot loop
      let stableCount = 0, considered = 0;
      for (let i=0;i<activeCount;i++){
        const ix=i*3;
        let px=pos[ix], py=pos[ix+1], pz=pos[ix+2];
        let ax=0, ay=0, az=0;
        let nearest = 1e18, captured = -1;
        for (let k=0;k<nW;k++){
          const w = wells[k];
          const dx=w.x-px, dy=w.y-py, dz=w.z-pz;
          const d2=dx*dx+dy*dy+dz*dz;
          const rr = radiusOf(w);
          if (d2 < rr*rr){ captured = k; break; }
          if (d2 < nearest) nearest = d2;
          const inv = 1/Math.sqrt(d2+SOFT);
          const a = G*w.mass*inv*inv*inv*f;
          ax+=dx*a; ay+=dy*a; az+=dz*a;
        }
        if (captured >= 0){
          const w = wells[captured];
          w.accreted += 1;
          if (captureEnergy < 40) captureEnergy += 1;
          flash(px,py,pz, 24 + Math.random()*16, 0xfff2dc);
          spawnShell(i, true);
          continue;
        }
        let vx=vel[ix]+ax, vy=vel[ix+1]+ay, vz=vel[ix+2]+az;
        vx*=0.9992; vy*=0.9992; vz*=0.9992;
        const sp2 = vx*vx+vy*vy+vz*vz;
        const MAXS=11;
        if (sp2 > MAXS*MAXS){ const s=MAXS/Math.sqrt(sp2); vx*=s; vy*=s; vz*=s; }
        px+=vx*f; py+=vy*f; pz+=vz*f;
        // recycle if it escapes
        const dCenter = px*px+py*py+pz*pz;
        if (dCenter > BOUND*BOUND){ spawnShell(i,true); continue; }
        vel[ix]=vx; vel[ix+1]=vy; vel[ix+2]=vz;
        pos[ix]=px; pos[ix+1]=py; pos[ix+2]=pz;
        // temperature ~ speed (energy) -> color
        const tgt = Math.min(1, Math.sqrt(sp2)/8.0);
        aTemp[i] += (tgt - aTemp[i])*0.18;
        // stability proxy: change in nearest-radius
        const nr = Math.sqrt(nearest);
        const dr = Math.abs(nr - rPrev[i]); rPrev[i]=nr;
        const st = Math.max(0, 1 - dr*0.18);
        stab[i] += (st - stab[i])*0.06;
        if (nr < FIELD*1.3){ considered++; if (stab[i] > 0.7) stableCount++; }
      }
      // harmony = share of bound particles riding stable orbits
      const h = considered>40 ? (stableCount/considered)*100 : 0;
      harmony += (h - harmony)*0.04;
    }
    posAttr.needsUpdate = true;
    tempAttr.needsUpdate = true;
  }

  /* ---------- visual update of wells / effects ---------- */
  function updateVisuals(now){
    for (const w of wells){
      const r = radiusOf(w);
      w.pulse += 0.04;
      const bob = 1 + Math.sin(w.pulse)*0.05;
      w.grp.position.set(w.x,w.y,w.z);
      const cs = r*2.4*bob;
      w.core.scale.set(cs,cs,1);
      const rs = r*4.6*(1+Math.sin(w.pulse*0.6)*0.04);
      w.ring.scale.set(rs,rs,1);
      w.ring.material.opacity = 0.28 + Math.min(0.4, w.accreted*0.0008);
      w.core.material.opacity = 0.9;
    }
    for (const f of flashPool){
      if (f.life<=0) continue;
      f.life -= 0.016/f.max;
      if (f.life<=0){ f.sp.visible=false; f.sp.material.opacity=0; continue; }
      const s = f.size*(1.4-f.life*0.8);
      f.sp.scale.set(s,s,1); f.sp.material.opacity = f.life*0.9;
    }
    for (const r of ripplePool){
      if (r.life<=0) continue;
      r.life -= 0.016/0.9;
      if (r.life<=0){ r.sp.visible=false; r.sp.material.opacity=0; continue; }
      const s = r.from + (r.to-r.from)*(1-r.life);
      r.sp.scale.set(s,s,1); r.sp.material.opacity = r.life*0.6;
    }
  }

  /* ============================================================
     discoveries — wonder, not grind
     ============================================================ */
  const DISC = [
    { id:'first_orbit', mark:'✦', t:'はじめての軌道',  c:'光が落ちず、円を描いて回りはじめた。' },
    { id:'accretion',   mark:'◉', t:'降着円盤',        c:'重力源のまわりに、渦巻く光の円盤が生まれた。' },
    { id:'binary',      mark:'❉', t:'連星系',          c:'二つの重力が、たがいを巡って踊っている。' },
    { id:'triple',      mark:'⁂', t:'三重連星',        c:'三つの重力源が、ひとつの宇宙に共存している。' },
    { id:'galaxy',      mark:'✺', t:'銀河',            c:'無数の星が、ひとつの大きな渦になった。' },
    { id:'merger',      mark:'⊛', t:'合体 ― 重力波',   c:'二つの重力が溶け合い、時空に波紋が走った。' },
    { id:'supernova',   mark:'☀', t:'超新星',          c:'光を食べきった重力源が、まばゆく爆ぜた。' },
    { id:'harmony',     mark:'❈', t:'調和',            c:'宇宙のほとんどが、静かな軌道に落ち着いた。' },
    { id:'cosmos',      mark:'✷', t:'静かな宇宙',      c:'長いあいだ、この秩序は崩れなかった。' }
  ];
  let found = {};
  try { found = JSON.parse(localStorage.getItem('uc_discoveries')||'{}'); } catch(e){ found = {}; }

  function unlock(id){
    if (found[id]) return;
    found[id] = true;
    try { localStorage.setItem('uc_discoveries', JSON.stringify(found)); } catch(e){}
    const d = DISC.find(x=>x.id===id); if(!d) return;
    showToast(d.t, d.c);
    chime(id==='merger'?'merge':'discover');
  }

  /* a well that has devoured enough light ignites — a recurring spectacle */
  const IGNITE = 4500;
  function ignite(w){
    w.accreted = 0;
    flash(w.x,w.y,w.z, radiusOf(w)*6, 0xffffff);
    ripple(w.x,w.y,w.z, radiusOf(w)*18);
    const R=300, R2=R*R;
    for (let i=0;i<activeCount;i++){
      const ix=i*3, dx=pos[ix]-w.x, dy=pos[ix+1]-w.y, dz=pos[ix+2]-w.z;
      const d2=dx*dx+dy*dy+dz*dz;
      if (d2<R2){ const d=Math.sqrt(d2)+0.001, f=(1-d/R)*6.5;
        vel[ix]+=dx/d*f; vel[ix+1]+=dy/d*f; vel[ix+2]+=dz/d*f; aTemp[i]=1; }
    }
    swell();
    chime('discover');
    unlock('supernova');
  }

  /* discovery detection */
  let harmonyTimer = 0;
  function detect(now){
    for (const w of wells){ if (w.accreted > IGNITE) ignite(w); }
    if (!wells.length) { harmonyTimer = 0; return; }
    // first orbit
    if (!found.first_orbit){
      let bound=0; for (let i=0;i<activeCount;i++){ if (stab[i]>0.6) bound++; }
      if (bound > 200) unlock('first_orbit');
    }
    // accretion
    if (!found.accretion && wells.some(w=>w.accreted>800)) unlock('accretion');
    // binary / triple
    if (!found.binary && wells.length>=2) unlock('binary');
    if (!found.triple && wells.length>=3) unlock('triple');
    // galaxy — many stars in coherent stable orbit around one dominant mass
    if (!found.galaxy){
      let bound=0; for (let i=0;i<activeCount;i++){ if (stab[i]>0.7) bound++; }
      if (bound > activeCount*0.45 && wells.length>=1) unlock('galaxy');
    }
    // harmony
    if (!found.harmony && harmony > 72) unlock('harmony');
    // cosmos — high harmony sustained
    if (harmony > 65){ harmonyTimer += 1; } else { harmonyTimer = Math.max(0, harmonyTimer-2); }
    if (!found.cosmos && harmonyTimer > 60*12) unlock('cosmos');
  }

  /* ============================================================
     audio — generative ambient (optional)
     ============================================================ */
  /* ---- audio: a cosmos you can play ----
     matter falling into gravity becomes a music box; each well hums a chord tone. */
  let actx=null, master=null, comp=null, padGain=null, soundOn=false;
  let captureEnergy=0, nextNote=0;
  /* C major pentatonic over three octaves — it can never sound "wrong" */
  const SCALE = [130.81,146.83,164.81,196.00,220.00,
                 261.63,293.66,329.63,392.00,440.00,
                 523.25,587.33,659.25,783.99,880.00];
  function initAudio(){
    if (actx) return;
    try{
      actx = new (window.AudioContext||window.webkitAudioContext)();
      comp = actx.createDynamicsCompressor();
      comp.threshold.value=-18; comp.ratio.value=4; comp.attack.value=0.004; comp.release.value=0.25;
      comp.connect(actx.destination);
      master = actx.createGain(); master.gain.value=0; master.connect(comp);
      // slow evolving pad bed
      const filt = actx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=460; filt.Q.value=3; filt.connect(master);
      padGain = actx.createGain(); padGain.gain.value=0.26; padGain.connect(filt);
      [65.41,98.00,130.81].forEach((fr,i)=>{
        const o=actx.createOscillator(); o.type='sine'; o.frequency.value=fr;
        const g=actx.createGain(); g.gain.value=0.1/(i+1); o.connect(g); g.connect(padGain); o.start();
        const lfo=actx.createOscillator(); lfo.frequency.value=0.04+0.03*i;
        const lg=actx.createGain(); lg.gain.value=0.03; lfo.connect(lg); lg.connect(g.gain); lfo.start();
      });
      const flfo=actx.createOscillator(); flfo.frequency.value=0.025;
      const fg=actx.createGain(); fg.gain.value=150; flfo.connect(fg); fg.connect(filt.frequency); flfo.start();
    }catch(e){ actx=null; }
  }
  function setSound(on){
    soundOn = on;
    if (on){
      initAudio();
      if (actx){
        if (actx.state==='suspended') actx.resume();
        master.gain.cancelScheduledValues(actx.currentTime);
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime+1.4);
        wells.forEach(startVoice);
        nextNote = performance.now()+220;
      }
    } else if (actx){
      master.gain.cancelScheduledValues(actx.currentTime);
      master.gain.linearRampToValueAtTime(0, actx.currentTime+0.5);
      wells.forEach(stopVoice);
    }
  }
  function noteForMass(m){ // heavier mass -> lower root note
    const idx = Math.round((1-Math.min(1,(m-1)/7))*6) + 3; // ~3..9
    return Math.max(0, Math.min(SCALE.length-1, idx));
  }
  function startVoice(w){
    if (!soundOn || !actx || w.voice) return;
    const root = SCALE[noteForMass(w.mass)]*0.5;
    const o=actx.createOscillator(); o.type='sine'; o.frequency.value=root;
    const o2=actx.createOscillator(); o2.type='triangle'; o2.frequency.value=root*1.004;
    const g=actx.createGain(); g.gain.value=0;
    o.connect(g); o2.connect(g); g.connect(master);
    o.start(); o2.start();
    g.gain.linearRampToValueAtTime(0.035, actx.currentTime+1.6);
    w.voice = { o, o2, g };
  }
  function stopVoice(w){
    if (!w.voice || !actx) return;
    const v=w.voice; w.voice=null;
    try{
      v.g.gain.cancelScheduledValues(actx.currentTime);
      v.g.gain.linearRampToValueAtTime(0, actx.currentTime+0.4);
      v.o.stop(actx.currentTime+0.5); v.o2.stop(actx.currentTime+0.5);
    }catch(e){}
  }
  function pluck(freq, vel){
    const t=actx.currentTime;
    const o=actx.createOscillator(); o.type='sine'; o.frequency.value=freq;
    const o2=actx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2.001;
    const g=actx.createGain(), g2=actx.createGain();
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.12*vel,t+0.008); g.gain.exponentialRampToValueAtTime(0.0001,t+1.1);
    g2.gain.setValueAtTime(0.0001,t); g2.gain.exponentialRampToValueAtTime(0.04*vel,t+0.008); g2.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
    o.connect(g); o2.connect(g2); g.connect(master); g2.connect(master);
    o.start(t); o2.start(t); o.stop(t+1.2); o2.stop(t+0.6);
  }
  function ping(mass){ if (soundOn&&actx) pluck(SCALE[noteForMass(mass)], 0.9); }
  function swell(){
    if (!soundOn||!actx) return;
    const t=actx.currentTime;
    [SCALE[2],SCALE[5],SCALE[9]].forEach((f,i)=>{
      const o=actx.createOscillator(); o.type='sine'; o.frequency.value=f*0.5;
      const g=actx.createGain(); g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.18,t+0.1+i*0.05); g.gain.exponentialRampToValueAtTime(0.0001,t+3.0);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+3.1);
    });
  }
  function chime(kind){
    if (!soundOn||!actx) return;
    const t=actx.currentTime;
    const notes = kind==='merge'?[SCALE[2],SCALE[5],SCALE[8]]:[SCALE[5],SCALE[8],SCALE[11]];
    notes.forEach((f,i)=>{
      const o=actx.createOscillator(); o.type='sine'; o.frequency.value=f;
      const g=actx.createGain(); g.gain.setValueAtTime(0.0001,t+i*0.14);
      g.gain.exponentialRampToValueAtTime(0.1,t+i*0.14+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+i*0.14+1.5);
      o.connect(g); g.connect(master); o.start(t+i*0.14); o.stop(t+i*0.14+1.6);
    });
  }
  function audioStep(now){
    if (!soundOn || !actx) return;
    captureEnergy *= 0.96;
    if (now >= nextNote){
      if (captureEnergy > 0.6 && wells.length){
        const w = wells[(Math.random()*wells.length)|0];
        const base = SCALE[noteForMass(w.mass)];
        const note = base * (Math.random()<0.5?1:2);
        pluck(note, Math.min(1, 0.4 + captureEnergy*0.05));
        captureEnergy *= 0.5;
      }
      nextNote = now + (230 - Math.min(150, captureEnergy*9));
    }
  }

  /* ============================================================
     input — tap creates, drag orbits, hold forges mass
     ============================================================ */
  const chargeEl = document.getElementById('charge');
  let press = null; // {x,y,t,moved,charge}
  const TAP_MOVE = 8;
  const plane = new THREE.Plane();
  const ray = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  const hit = new THREE.Vector3();

  function screenToWorld(sx, sy){
    ndc.x = (sx/innerWidth)*2-1; ndc.y = -(sy/innerHeight)*2+1;
    ray.setFromCamera(ndc, camera);
    const n = new THREE.Vector3().subVectors(camera.position, cam.target).normalize();
    plane.setFromNormalAndCoplanarPoint(n, cam.target);
    if (ray.ray.intersectPlane(plane, hit)) return hit.clone();
    return cam.target.clone();
  }
  function massFromCharge(c){ return 1 + c*7; } // 0..1 -> 1..8

  function down(x,y){
    press = { x, y, sx:x, sy:y, t:performance.now(), moved:false, charge:0 };
    lastInteract = performance.now();
    dismissVeil();
  }
  function move(x,y){
    if (!press) return;
    const dx=x-press.sx, dy=y-press.sy;
    if (!press.moved && (Math.abs(x-press.x)>TAP_MOVE || Math.abs(y-press.y)>TAP_MOVE)){
      press.moved = true; hideCharge();
    }
    if (press.moved){
      cam.tTheta -= dx*0.005;
      cam.tPhi   -= dy*0.005;
      cam.tPhi = Math.max(PHI_MIN, Math.min(PHI_MAX, cam.tPhi));
      press.sx=x; press.sy=y; lastInteract=performance.now();
    }
  }
  function up(){
    if (!press) return;
    if (!press.moved){
      const w = screenToWorld(press.x, press.y);
      addWell(w.x, w.y, w.z, massFromCharge(press.charge));
      flash(w.x,w.y,w.z, 60+press.charge*120, 0xbcd0ff);
      if (press.charge>0.05) ripple(w.x,w.y,w.z, 120+press.charge*260);
    }
    hideCharge();
    press = null;
  }
  function showCharge(){
    if (!press || press.moved) return;
    chargeEl.style.opacity = 1;
    chargeEl.style.left = press.x+'px'; chargeEl.style.top = press.y+'px';
    const sz = 24 + press.charge*120;
    chargeEl.style.width = sz+'px'; chargeEl.style.height = sz+'px';
    const a = 0.25 + press.charge*0.6;
    chargeEl.style.borderColor = 'rgba(233,205,160,'+a.toFixed(2)+')';
    chargeEl.style.boxShadow = '0 0 '+(press.charge*40)+'px rgba(233,205,160,'+(press.charge*0.5).toFixed(2)+'), inset 0 0 '+(press.charge*30)+'px rgba(157,185,255,'+(press.charge*0.4).toFixed(2)+')';
  }
  function hideCharge(){ chargeEl.style.opacity = 0; chargeEl.style.width='0'; chargeEl.style.height='0'; }

  /* pointer + touch wiring */
  canvas.addEventListener('mousedown', e=>{ down(e.clientX,e.clientY); });
  window.addEventListener('mousemove', e=>{ if(press) move(e.clientX,e.clientY); });
  window.addEventListener('mouseup', up);
  canvas.addEventListener('wheel', e=>{ e.preventDefault(); cam.tRadius = Math.max(RAD_MIN, Math.min(RAD_MAX, cam.tRadius * (1+ (e.deltaY>0?0.1:-0.1)))); lastInteract=performance.now(); }, {passive:false});

  let pinch = null;
  canvas.addEventListener('touchstart', e=>{
    e.preventDefault();
    if (e.touches.length===1){ down(e.touches[0].clientX, e.touches[0].clientY); }
    else if (e.touches.length===2){
      press=null; hideCharge();
      const a=e.touches[0], b=e.touches[1];
      pinch = { d:Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY),
                mx:(a.clientX+b.clientX)/2, my:(a.clientY+b.clientY)/2 };
    }
  }, {passive:false});
  canvas.addEventListener('touchmove', e=>{
    e.preventDefault();
    if (e.touches.length===1 && press){ move(e.touches[0].clientX, e.touches[0].clientY); }
    else if (e.touches.length===2 && pinch){
      const a=e.touches[0], b=e.touches[1];
      const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      const mx=(a.clientX+b.clientX)/2, my=(a.clientY+b.clientY)/2;
      cam.tRadius = Math.max(RAD_MIN, Math.min(RAD_MAX, cam.tRadius * (pinch.d/Math.max(1,d))));
      cam.tTheta -= (mx-pinch.mx)*0.005;
      cam.tPhi   -= (my-pinch.my)*0.005;
      cam.tPhi = Math.max(PHI_MIN, Math.min(PHI_MAX, cam.tPhi));
      pinch.d=d; pinch.mx=mx; pinch.my=my; lastInteract=performance.now();
    }
  }, {passive:false});
  canvas.addEventListener('touchend', e=>{
    e.preventDefault();
    if (e.touches.length===0){ if(press) up(); pinch=null; }
  }, {passive:false});

  /* ============================================================
     UI wiring
     ============================================================ */
  const $ = id => document.getElementById(id);
  function dismissVeil(){ const v=$('veil'); if(v && !v.classList.contains('gone')){ v.classList.add('gone'); setTimeout(()=>v.style.display='none',1500); } }
  $('veil').addEventListener('pointerdown', dismissVeil);

  $('title').addEventListener('click', ()=>{ cam.tTheta=0.6; cam.tPhi=1.18; cam.tRadius=1180; });

  $('btn-pause').addEventListener('click', function(){
    running=!running; this.querySelector('.ic').textContent = running?'❚❚':'▶';
    this.querySelector('.tx').textContent = running?'静止':'再開';
  });
  $('btn-speed').addEventListener('click', function(){
    speedIdx=(speedIdx+1)%SPEEDS.length; timeFlow=SPEEDS[speedIdx];
    this.querySelector('.tx').textContent = timeFlow.toFixed(1)+'×';
  });
  $('btn-seed').addEventListener('click', seedGalaxy);
  $('btn-clear').addEventListener('click', ()=>{ clearWells(); for(let i=0;i<N_MAX;i++) spawnShell(i,true); harmony=0; harmonyTimer=0; });
  $('btn-sound').addEventListener('click', function(){
    setSound(!soundOn); this.classList.toggle('on', soundOn);
  });
  $('btn-disc').addEventListener('click', openSheet);
  $('sheet-close').addEventListener('click', ()=> $('sheet').classList.remove('show'));
  $('sheet').addEventListener('click', e=>{ if(e.target===$('sheet')) $('sheet').classList.remove('show'); });

  function openSheet(){
    const list = $('disc-list'); list.innerHTML='';
    let n=0;
    DISC.forEach(d=>{
      const got = !!found[d.id]; if(got) n++;
      const el=document.createElement('div');
      el.className = 'disc '+(got?'found':'locked');
      el.innerHTML = '<div class="mark">'+(got?d.mark:'·')+'</div><div class="body"><div class="t">'+
        (got?d.t:'？？？')+'</div><div class="c">'+(got?d.c:'まだ見ぬ現象。創りつづければ、いつか出会える。')+'</div></div>';
      list.appendChild(el);
    });
    $('disc-count').textContent = n+' / '+DISC.length+' DISCOVERED';
    $('sheet').classList.add('show');
  }

  let toastTimer=null;
  function showToast(name, desc){
    const t=$('toast'); t.querySelector('.n').textContent=name; t.querySelector('.d').textContent=desc;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove('show'), 4200);
  }

  /* seed a rotating galaxy: one dominant mass + a swirling disk */
  function seedGalaxy(){
    dismissVeil();
    clearWells();
    const w = addWell(0,0,0, 6.5);
    const Rg = FIELD*0.85;
    for (let i=0;i<N_MAX;i++){
      const r = (0.12 + Math.pow(Math.random(),0.6)*0.88) * Rg;
      const t = Math.random()*Math.PI*2;
      const arm = Math.sin(t*2 + r*0.012)*0.35; // faint spiral bias
      const x = Math.cos(t)*r, z = Math.sin(t)*r, y = (Math.random()-0.5)*r*0.06;
      pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=z;
      // circular velocity matched to the softened force law => stable rotation
      const invr = 1/Math.sqrt(r*r+SOFT);
      const acc = G*w.mass*invr*invr*invr*r;
      const v = Math.sqrt(acc*r) * (0.96+arm*0.08);
      vel[i*3]   = -Math.sin(t)*v;
      vel[i*3+1] = (Math.random()-0.5)*0.05;
      vel[i*3+2] =  Math.cos(t)*v;
      aSize[i]=0.85+Math.random()*1.5; aTemp[i]=0.3; stab[i]=0.5; rPrev[i]=r;
    }
    geo.getAttribute('aSize').needsUpdate = true;
    cam.tRadius = 1320; cam.tPhi = 0.85;
  }

  /* ============================================================
     main loop + adaptive quality
     ============================================================ */
  let last = performance.now();
  let fpsAcc=0, fpsN=0, fpsShown=0, slowFrames=0;
  const fpsEl = $('fps');

  function loop(now){
    const dt = Math.min(0.05, (now-last)/1000) * 60; // normalized to ~60fps units
    last = now;

    // idle cinematic drift
    if (now - lastInteract > 4500){ cam.tTheta += 0.0006*dt; }

    applyCamera();

    if (running) step(dt);
    updateVisuals(now);
    detect(now);
    audioStep(now);

    // the cosmos slowly drifts through moods (a season ~2.6 min long)
    pMat.uniforms.uMood.value = Math.sin(now*0.00004);

    // press-hold charging
    if (press && !press.moved){
      press.charge = Math.min(1, (now-press.t)/1400);
      showCharge();
    }

    // readouts
    harmonyShown += (harmony-harmonyShown)*0.1;
    $('r-stars').textContent = activeCount.toLocaleString();
    $('r-wells').textContent = wells.length;
    $('r-harm').innerHTML = Math.round(harmonyShown)+'<small>%</small>';
    $('r-harm-bar').style.width = Math.max(0,Math.min(100,harmonyShown))+'%';

    renderer.render(scene, camera);

    // adaptive quality
    const frameMs = performance.now()-now;
    fpsAcc += frameMs; fpsN++;
    if (fpsN>=30){
      const avg = fpsAcc/fpsN; fpsShown = Math.round(1000/Math.max(1,avg));
      fpsEl.textContent = fpsShown+' fps';
      if (avg > 30 && activeCount > 6000){ activeCount = Math.max(6000, activeCount-3000); geo.setDrawRange(0,activeCount); slowFrames++; }
      else if (avg < 15 && activeCount < N_MAX){ activeCount = Math.min(N_MAX, activeCount+2000); geo.setDrawRange(0,activeCount); }
      fpsAcc=0; fpsN=0;
    }
    requestAnimationFrame(loop);
  }

  /* resize */
  addEventListener('resize', ()=>{
    renderer.setSize(innerWidth, innerHeight, true);
    camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
    pMat.uniforms.uScale.value = innerHeight*4.5;
  });

  /* gentle first-touch starts everything (audio resume needs gesture; sound stays off until asked) */
  window.addEventListener('pointerdown', function once(){ window.removeEventListener('pointerdown', once); }, {once:true});

  requestAnimationFrame(loop);

  </script>
</body>
